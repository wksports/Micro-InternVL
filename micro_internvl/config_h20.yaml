# Micro-InternVL training configuration optimized for NVIDIA H20 (96GB VRAM).
# For smaller GPUs, use micro_internvl/config.yaml.

model:
  base_model: "OpenGVLab/InternVL3_5-4B"
  torch_dtype: "bfloat16"
  device_map: null

lora:
  r: 64
  alpha: 128
  dropout: 0.05

micro_internvl:
  detection_head:
    hidden_dim: 512
    num_layers: 2
    activation: "gelu"
  temperature: 0.07

training:
  output_dir: "checkpoints"
  num_epochs: 50
  batch_size: 4
  gradient_accumulation_steps: 2
  effective_batch_size: 8
  head_lr: 5.0e-5
  lora_lr: 1.0e-5
  weight_decay: 0.05
  lr_scheduler: "cosine"
  warmup_epochs: 2
  max_grad_norm: 0.1
  gradient_checkpointing: false
  mixed_precision: "bf16"
  seed: 42
  save_every_epochs: 5
  eval_every_epochs: 5

loss:
  class_weight: 1.0
  bbox_weight: 5.0
  giou_weight: 2.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  lambda_patch: 0.1
  lambda_box: 0.1

data:
  image_dir: "../raw/emds7/EMDS7"
  train_json: "data/emds7/instances_train.json"
  val_json: "data/emds7/instances_val.json"
  test_json: "data/emds7/instances_test.json"
  category_map: "data/emds7/category_map.json"
  base_novel_split: "data/emds7/base_novel_split.json"
  query_file: "data/emds7/queries.json"
  resolution: 448
  num_workers: 8
  pin_memory: true

inference:
  confidence_threshold: 0.001
  nms_threshold: 0.5
  top_k: 100

logging:
  log_dir: "outputs/logs"
  use_wandb: false
  wandb_project: "micro-internvl"
  wandb_run_name: null
